{% extends "base.html" %}
{% block content %}
<h1>Ошибки</h1>
<table>
  <tr><th>ID</th><th>Source</th><th>Message</th><th>Created</th></tr>
  {% for log in logs %}
  <tr><td>{{ log.id }}</td><td>{{ log.source }}</td><td>{{ log.message }}</td><td>{{ log.created_at }}</td></tr>
  {% endfor %}
</table>
{% endblock %}
