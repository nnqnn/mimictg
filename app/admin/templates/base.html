<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mimic Admin</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f8fa; color: #15171a; }
    header { background: #111827; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav a { color: #cbd5e1; margin-right: 16px; text-decoration: none; font-size: 14px; }
    nav a:hover { color: #fff; }
    main { max-width: 1120px; margin: 24px auto; padding: 0 18px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eef0f3; vertical-align: top; }
    th { color: #4b5563; font-size: 13px; background: #fafafa; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font: inherit; }
    button { padding: 10px 14px; border: 0; border-radius: 6px; background: #111827; color: white; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
    .muted { color: #6b7280; font-size: 13px; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <header>
    <strong>Mimic Admin</strong>
    <nav>
      <a href="/">Статистика</a>
      <a href="/users">Пользователи</a>
      <a href="/workspaces">Каналы</a>
      <a href="/logs/ai">AI logs</a>
      <a href="/logs/errors">Ошибки</a>
      <a href="/broadcast">Рассылка</a>
      <a href="/logout">Выйти</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
