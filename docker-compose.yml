services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mimic
      POSTGRES_USER: mimic
      POSTGRES_PASSWORD: mimic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimic -d mimic"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m app.main"

  admin:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.admin.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:

